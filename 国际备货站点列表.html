<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>国际备货站点列表</title>
  <!-- CDN：antd 5 最新线 + icons 5 + dayjs + Babel -->
  <!-- React 19 官方已移除 UMD，HTML 直开(file://) 使用 React 18.3.1 UMD（antd 5 兼容 React>=18）；勿加 crossorigin -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/reset.css" />
  <style>
    body { margin: 0; background: #f5f5f5; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd-with-locales.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5/dist/index.umd.js"></script>
  <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;
    const {
      ConfigProvider,
      theme,
      Form,
      Select,
      Button,
      Card,
      Table,
      Modal,
      Space,
      message,
      Badge,
      Input,
      Typography,
      Row,
      Col,
      DatePicker,
    } = antd;
    const { PlusOutlined, ReloadOutlined, ColumnHeightOutlined, SettingOutlined } = icons;
    const zhCN = antd.locales?.zhCN;

    const colorPrimary = '#1677FF';
    const FILTER_PADDING = 20;
    const FILTER_CONTROL_WIDTH = 260;
    const FILTER_GUTTER = 50;
    const FILTER_ROW_GAP = 20;
    const FILTER_LABEL_WIDTH = 80;
    const FILTER_ITEM_WIDTH = FILTER_LABEL_WIDTH + FILTER_CONTROL_WIDTH;
    const FILTER_ACTION_WITH_EXPAND = 240;
    const FILTER_ACTION_NO_EXPAND = 168;
    const FILTER_FIELD_KEYS = ['platforms', 'sites', 'status', 'creator', 'createTimeRange'];

    function calcFilterLayout(containerWidth, fieldCount) {
      if (!containerWidth) {
        return { collapsedCount: fieldCount, showExpand: false, perRow: fieldCount };
      }
      const inner = containerWidth - FILTER_PADDING * 2;
      const fieldsWidth = (n) => n * FILTER_ITEM_WIDTH + Math.max(0, n - 1) * FILTER_GUTTER;

      let perRow = 1;
      for (let n = fieldCount; n >= 1; n--) {
        if (fieldsWidth(n) <= inner) {
          perRow = n;
          break;
        }
      }

      if (fieldsWidth(fieldCount) + FILTER_ACTION_NO_EXPAND <= inner) {
        return { collapsedCount: fieldCount, showExpand: false, perRow };
      }

      let collapsedCount = 1;
      for (let k = fieldCount - 1; k >= 1; k--) {
        if (fieldsWidth(k) + FILTER_ACTION_WITH_EXPAND <= inner) {
          collapsedCount = k;
          break;
        }
      }
      return { collapsedCount, showExpand: true, perRow };
    }

    function LucideIcon({ name, size = 14, style = {} }) {
      const icon = lucide?.icons?.[name];
      if (!icon) return null;
      const svg = icon.toSvg({ width: size, height: size, 'stroke-width': 2 });
      return (
        <span
          style={{ display: 'inline-flex', alignItems: 'center', verticalAlign: 'middle', ...style }}
          dangerouslySetInnerHTML={{ __html: svg }}
        />
      );
    }

    const INITIAL_DATA = [
      { id: 1, platform: 'Amazon', site: 'US-West', status: 'enabled', remark: '美西主仓备货', creator: '张三', createTime: '2026-06-01 09:12:33', updater: '李四', updateTime: '2026-06-05 14:20:01' },
      { id: 2, platform: 'Amazon', site: 'US-East', status: 'enabled', remark: '美东补货站点', creator: '张三', createTime: '2026-06-01 09:15:48', updater: '王五', updateTime: '2026-06-06 10:05:12' },
      { id: 3, platform: 'eBay', site: 'UK-London', status: 'disabled', remark: '英国站点，暂停补货', creator: '赵六', createTime: '2026-05-28 16:42:09', updater: '赵六', updateTime: '2026-06-02 08:30:55' },
      { id: 4, platform: 'Shopee', site: 'SG-Central', status: 'enabled', remark: '新加坡中心仓', creator: '孙七', createTime: '2026-05-30 11:08:20', updater: '李四', updateTime: '2026-06-04 17:45:33' },
      { id: 5, platform: 'Lazada', site: 'MY-KL', status: 'enabled', remark: '吉隆坡备货', creator: '周八', createTime: '2026-05-25 10:00:00', updater: '周八', updateTime: '2026-06-01 09:00:00' },
      { id: 6, platform: 'AliExpress', site: 'RU-Moscow', status: 'disabled', remark: '俄区暂不参与补货引擎', creator: '吴九', createTime: '2026-05-20 15:30:18', updater: '王五', updateTime: '2026-05-29 13:12:40' },
      { id: 7, platform: 'Walmart', site: 'US-West', status: 'enabled', remark: '沃尔玛美西', creator: '张三', createTime: '2026-05-18 08:22:00', updater: '李四', updateTime: '2026-05-27 19:01:10' },
      { id: 8, platform: 'Amazon', site: 'JP-Tokyo', status: 'enabled', remark: '日本东京仓', creator: '田中', createTime: '2026-05-15 13:40:25', updater: '孙七', updateTime: '2026-05-26 11:33:48' },
      { id: 9, platform: 'eBay', site: 'DE-Berlin', status: 'disabled', remark: '德国柏林，停用', creator: '赵六', createTime: '2026-05-12 09:55:14', updater: '赵六', updateTime: '2026-05-22 15:18:02' },
      { id: 10, platform: 'Shopee', site: 'MY-KL', status: 'enabled', remark: '虾皮马来', creator: '孙七', createTime: '2026-05-10 17:05:39', updater: '王五', updateTime: '2026-05-21 10:44:21' },
      { id: 11, platform: 'Lazada', site: 'SG-Central', status: 'enabled', remark: 'Lazada 新加坡', creator: '周八', createTime: '2026-05-08 12:00:00', updater: '李四', updateTime: '2026-05-19 09:30:00' },
      { id: 12, platform: 'AliExpress', site: 'UK-London', status: 'enabled', remark: '速卖通英国', creator: '吴九', createTime: '2026-05-05 14:26:51', updater: '吴九', updateTime: '2026-05-16 16:12:09' },
    ];

    const PLATFORM_SITES = {};
    INITIAL_DATA.forEach((r) => {
      if (!PLATFORM_SITES[r.platform]) PLATFORM_SITES[r.platform] = new Set();
      PLATFORM_SITES[r.platform].add(r.site);
    });
    Object.keys(PLATFORM_SITES).forEach((k) => {
      PLATFORM_SITES[k] = [...PLATFORM_SITES[k]];
    });

    const ALL_PLATFORMS = Object.keys(PLATFORM_SITES);
    const ALL_SITES = [...new Set(INITIAL_DATA.map((r) => r.site))];

    function StatusBadge({ status }) {
      if (status === 'enabled') {
        return <Badge status="success" text="启用" />;
      }
      return <Badge status="default" text="禁用" />;
    }

    function StockSiteListPage() {
      const [form] = Form.useForm();
      const [dataSource, setDataSource] = useState(INITIAL_DATA);
      const [expand, setExpand] = useState(false);
      const [filters, setFilters] = useState({
        platforms: [],
        sites: [],
        status: undefined,
        creator: undefined,
        createTimeRange: null,
      });
      const [selectedRowKeys, setSelectedRowKeys] = useState([]);
      const [tableSize, setTableSize] = useState('middle');
      const [modalOpen, setModalOpen] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [modalSubmitting, setModalSubmitting] = useState(false);
      const [modalForm] = Form.useForm();
      const [refreshKey, setRefreshKey] = useState(0);
      const filterContainerRef = useRef(null);
      const [filterLayout, setFilterLayout] = useState({
        collapsedCount: FILTER_FIELD_KEYS.length,
        showExpand: false,
        perRow: FILTER_FIELD_KEYS.length,
      });

      const watchPlatforms = Form.useWatch('platforms', form) || [];

      useEffect(() => {
        const el = filterContainerRef.current;
        if (!el) return undefined;
        const update = () => {
          setFilterLayout(calcFilterLayout(el.offsetWidth, FILTER_FIELD_KEYS.length));
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        if (!filterLayout.showExpand) setExpand(false);
      }, [filterLayout.showExpand]);

      const siteOptions = useMemo(() => {
        if (!watchPlatforms.length) return ALL_SITES;
        const set = new Set();
        watchPlatforms.forEach((p) => PLATFORM_SITES[p]?.forEach((s) => set.add(s)));
        return [...set];
      }, [watchPlatforms]);

      const filteredData = useMemo(() => {
        return dataSource.filter((row) => {
          if (filters.platforms.length && !filters.platforms.includes(row.platform)) return false;
          if (filters.sites.length && !filters.sites.includes(row.site)) return false;
          if (filters.status && row.status !== filters.status) return false;
          if (filters.creator && !row.creator.includes(filters.creator)) return false;
          if (filters.createTimeRange?.length === 2) {
            const t = dayjs(row.createTime);
            const [start, end] = filters.createTimeRange;
            if (t.isBefore(start.startOf('day')) || t.isAfter(end.endOf('day'))) return false;
          }
          return true;
        });
      }, [dataSource, filters, refreshKey]);

      const handlePlatformChange = (vals) => {
        const sites = form.getFieldValue('sites') || [];
        if (!vals?.length) return;
        const allowed = new Set();
        vals.forEach((p) => PLATFORM_SITES[p]?.forEach((s) => allowed.add(s)));
        const nextSites = sites.filter((s) => allowed.has(s));
        if (nextSites.length !== sites.length) form.setFieldValue('sites', nextSites);
      };

      const onSearch = () => {
        const v = form.getFieldsValue();
        setFilters({
          platforms: v.platforms || [],
          sites: v.sites || [],
          status: v.status,
          creator: v.creator?.trim() || undefined,
          createTimeRange: v.createTimeRange || null,
        });
        setSelectedRowKeys([]);
        message.success('查询完成');
      };

      const onReset = () => {
        form.resetFields();
        setFilters({
          platforms: [],
          sites: [],
          status: undefined,
          creator: undefined,
          createTimeRange: null,
        });
        setSelectedRowKeys([]);
        message.info('已重置');
      };

      const openCreate = () => {
        setEditingId(null);
        modalForm.resetFields();
        setModalOpen(true);
      };

      const openEdit = (record) => {
        setEditingId(record.id);
        modalForm.setFieldsValue({
          platform: record.platform,
          site: record.site,
          remark: record.remark,
        });
        setModalOpen(true);
      };

      const handleModalOk = async () => {
        try {
          const values = await modalForm.validateFields();
          setModalSubmitting(true);
          const now = dayjs().format('YYYY-MM-DD HH:mm:ss');
          if (editingId) {
            setDataSource((prev) =>
              prev.map((r) =>
                r.id === editingId
                  ? { ...r, ...values, updater: '当前用户', updateTime: now }
                  : r
              )
            );
            message.success('编辑成功');
          } else {
            const newId = Math.max(0, ...dataSource.map((r) => r.id)) + 1;
            setDataSource((prev) => [
              {
                id: newId,
                ...values,
                status: 'enabled',
                creator: '当前用户',
                createTime: now,
                updater: '当前用户',
                updateTime: now,
              },
              ...prev,
            ]);
            message.success('新增成功');
          }
          setModalOpen(false);
        } catch {
          // validateFields 失败时保持弹窗打开
        } finally {
          setModalSubmitting(false);
        }
      };

      const requireSelection = (action) => {
        if (!selectedRowKeys.length) {
          message.warning('请先选择数据');
          return false;
        }
        action();
        return true;
      };

      const columns = [
        {
          title: '补货平台',
          dataIndex: 'platform',
          key: 'platform',
          render: (text, record) => (
            <Typography.Link onClick={() => message.info(`查看：${record.platform} / ${record.site}`)}>
              {text}
            </Typography.Link>
          ),
        },
        { title: '补货站点', dataIndex: 'site', key: 'site' },
        {
          title: '状态',
          dataIndex: 'status',
          key: 'status',
          render: (s) => <StatusBadge status={s} />,
        },
        { title: '备注', dataIndex: 'remark', key: 'remark', ellipsis: true },
        { title: '创建人', dataIndex: 'creator', key: 'creator' },
        {
          title: '创建时间',
          dataIndex: 'createTime',
          key: 'createTime',
          sorter: (a, b) => a.createTime.localeCompare(b.createTime),
        },
        { title: '修改人', dataIndex: 'updater', key: 'updater' },
        {
          title: '修改时间',
          dataIndex: 'updateTime',
          key: 'updateTime',
          sorter: (a, b) => a.updateTime.localeCompare(b.updateTime),
        },
        {
          title: '操作',
          key: 'action',
          fixed: 'right',
          width: 120,
          render: (_, record) => (
            <Space split={<span style={{ color: '#d9d9d9' }}>|</span>} size={0}>
              <Typography.Link onClick={() => openEdit(record)}>编辑</Typography.Link>
              <Typography.Link onClick={() => message.info(`查看日志 #${record.id}`)}>日志</Typography.Link>
            </Space>
          ),
        },
      ];

      const renderFilterField = (key) => {
        const itemStyle = { marginBottom: 0 };
        const controlStyle = { width: FILTER_CONTROL_WIDTH };
        if (key === 'platforms') {
          return (
            <Form.Item label="补货平台" name="platforms" style={itemStyle}>
              <Select
                mode="multiple"
                allowClear
                placeholder="请选择"
                style={controlStyle}
                options={ALL_PLATFORMS.map((p) => ({ label: p, value: p }))}
                onChange={handlePlatformChange}
              />
            </Form.Item>
          );
        }
        if (key === 'sites') {
          return (
            <Form.Item label="补货站点" name="sites" style={itemStyle}>
              <Select
                mode="multiple"
                allowClear
                placeholder="请选择"
                style={controlStyle}
                options={siteOptions.map((s) => ({ label: s, value: s }))}
              />
            </Form.Item>
          );
        }
        if (key === 'status') {
          return (
            <Form.Item label="状态" name="status" style={itemStyle}>
              <Select
                allowClear
                placeholder="请选择"
                style={controlStyle}
                options={[
                  { label: '启用', value: 'enabled' },
                  { label: '禁用', value: 'disabled' },
                ]}
              />
            </Form.Item>
          );
        }
        if (key === 'creator') {
          return (
            <Form.Item label="创建人" name="creator" style={itemStyle}>
              <Input allowClear placeholder="请输入" style={controlStyle} />
            </Form.Item>
          );
        }
        if (key === 'createTimeRange') {
          return (
            <Form.Item label="创建时间" name="createTimeRange" style={itemStyle}>
              <DatePicker.RangePicker style={controlStyle} placeholder={['开始日期', '结束日期']} />
            </Form.Item>
          );
        }
        return null;
      };

      const renderFilterActions = () => (
        <Space>
          <Button onClick={onReset}>重置</Button>
          <Button type="primary" onClick={onSearch}>
            查询
          </Button>
          {filterLayout.showExpand && (
            <Button
              type="link"
              onClick={() => setExpand((v) => !v)}
              style={{ paddingInline: 4 }}
            >
              {expand ? '收起' : '展开'}
              <LucideIcon name={expand ? 'chevron-up' : 'chevron-down'} size={14} style={{ marginLeft: 4 }} />
            </Button>
          )}
        </Space>
      );

      const visibleFieldKeys = useMemo(() => {
        if (expand || !filterLayout.showExpand) return FILTER_FIELD_KEYS;
        return FILTER_FIELD_KEYS.slice(0, filterLayout.collapsedCount);
      }, [expand, filterLayout]);

      const expandedRows = useMemo(() => {
        if (!expand) return [visibleFieldKeys];
        const rows = [];
        for (let i = 0; i < FILTER_FIELD_KEYS.length; i += filterLayout.perRow) {
          rows.push(FILTER_FIELD_KEYS.slice(i, i + filterLayout.perRow));
        }
        return rows;
      }, [expand, filterLayout.perRow]);

      const densityCycle = () => {
        const order = ['large', 'middle', 'small'];
        const labels = { large: '默认', middle: '中等', small: '紧凑' };
        setTableSize((s) => {
          const next = order[(order.indexOf(s) + 1) % order.length];
          message.info(`表格密度：${labels[next]}`);
          return next;
        });
      };

      return (
        <div style={{ minHeight: '100vh', background: '#f5f5f5' }}>
          {/* 页面标题区 */}
          <div style={{ background: '#fff', padding: '16px 24px', borderBottom: '1px solid #f0f0f0' }}>
            <div style={{ color: 'rgba(0,0,0,0.45)', marginBottom: 8 }}>
              备货管理 <span style={{ margin: '0 8px', color: 'rgba(0,0,0,0.25)' }}>/</span>
              <span style={{ color: 'rgba(0,0,0,0.65)' }}>国际备货站点列表</span>
            </div>
            <div style={{ fontSize: 20, fontWeight: 600 }}>国际备货站点列表</div>
          </div>

          <div style={{ padding: 24 }}>
            {/* 查询表单卡片 */}
            <Card style={{ marginBottom: 16 }} bodyStyle={{ padding: FILTER_PADDING }}>
              <div ref={filterContainerRef}>
                <Form form={form} labelCol={{ flex: `0 0 ${FILTER_LABEL_WIDTH}px` }} wrapperCol={{ flex: '0 0 auto' }}>
                  {!expand ? (
                    <Row gutter={[FILTER_GUTTER, 0]} align="middle" wrap={false}>
                      {visibleFieldKeys.map((key) => (
                        <Col flex="none" key={key}>
                          {renderFilterField(key)}
                        </Col>
                      ))}
                      <Col flex="auto" style={{ textAlign: 'right' }}>
                        {renderFilterActions()}
                      </Col>
                    </Row>
                  ) : (
                    <>
                      {expandedRows.map((rowKeys, rowIndex) => (
                        <Row
                          key={rowKeys.join('-')}
                          gutter={[FILTER_GUTTER, 0]}
                          align="middle"
                          wrap={false}
                          style={{ marginTop: rowIndex > 0 ? FILTER_ROW_GAP : 0 }}
                        >
                          {rowKeys.map((key) => (
                            <Col flex="none" key={key}>
                              {renderFilterField(key)}
                            </Col>
                          ))}
                        </Row>
                      ))}
                      <Row justify="end" style={{ marginTop: FILTER_ROW_GAP }}>
                        <Col flex="none">{renderFilterActions()}</Col>
                      </Row>
                    </>
                  )}
                </Form>
              </div>
            </Card>

            {/* 表格卡片 */}
            <Card
              title="备货站点列表"
              extra={
                <Space>
                  <Button type="primary" icon={<PlusOutlined />} onClick={openCreate}>
                    新增
                  </Button>
                  <Button onClick={() => requireSelection(() => message.info(`批量编辑 ${selectedRowKeys.length} 项`))}>
                    批量编辑
                  </Button>
                  <Button
                    onClick={() =>
                      message.success(
                        selectedRowKeys.length
                          ? `导出选中 ${selectedRowKeys.length} 项`
                          : `导出全部 ${filteredData.length} 条查询结果`
                      )
                    }
                  >
                    导出
                  </Button>
                  <Button
                    onClick={() =>
                      requireSelection(() => {
                        setDataSource((prev) =>
                          prev.map((r) =>
                            selectedRowKeys.includes(r.id)
                              ? { ...r, status: r.status === 'enabled' ? 'disabled' : 'enabled', updater: '当前用户', updateTime: dayjs().format('YYYY-MM-DD HH:mm:ss') }
                              : r
                          )
                        );
                        message.success(`已切换 ${selectedRowKeys.length} 项状态`);
                      })
                    }
                  >
                    启用/禁用
                  </Button>
                  <Button onClick={() => requireSelection(() => message.info(`查看 ${selectedRowKeys.length} 项日志`))}>
                    日志
                  </Button>
                  <Space size={4} style={{ marginLeft: 8, paddingLeft: 12, borderLeft: '1px solid #f0f0f0' }}>
                    <Button type="text" icon={<ReloadOutlined />} onClick={() => { setRefreshKey((k) => k + 1); message.success('已刷新'); }} />
                    <Button type="text" icon={<ColumnHeightOutlined />} onClick={densityCycle} />
                    <Button type="text" icon={<SettingOutlined />} onClick={() => message.info('列设置')} />
                  </Space>
                </Space>
              }
            >
              <Table
                rowKey="id"
                size={tableSize}
                columns={columns}
                dataSource={filteredData}
                rowSelection={{
                  selectedRowKeys,
                  onChange: setSelectedRowKeys,
                }}
                pagination={{
                  showSizeChanger: true,
                  showTotal: (t) => `共 ${t} 条`,
                  defaultPageSize: 10,
                  pageSizeOptions: [10, 20, 50],
                }}
                scroll={{ x: 'max-content' }}
              />
            </Card>
          </div>

          <Modal
            title={editingId ? '编辑备货站点' : '新建备货站点'}
            open={modalOpen}
            width={520}
            destroyOnClose
            maskClosable={false}
            okText="确定"
            cancelText="取消"
            confirmLoading={modalSubmitting}
            onOk={handleModalOk}
            onCancel={() => setModalOpen(false)}
          >
            <Form form={modalForm} layout="horizontal" labelCol={{ span: 6 }} wrapperCol={{ span: 16 }}>
              <Form.Item label="补货平台" name="platform" rules={[{ required: true, message: '请选择补货平台' }]}>
                <Select
                  allowClear
                  placeholder="请选择"
                  options={ALL_PLATFORMS.map((p) => ({ label: p, value: p }))}
                />
              </Form.Item>
              <Form.Item label="补货站点" name="site" rules={[{ required: true, message: '请输入补货站点' }]}>
                <Input allowClear placeholder="请输入" />
              </Form.Item>
              <Form.Item label="备注" name="remark">
                <Input.TextArea placeholder="请输入" rows={3} />
              </Form.Item>
            </Form>
          </Modal>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ConfigProvider
        locale={zhCN}
        theme={{
          token: {
            colorPrimary,
            borderRadius: 6,
            fontSize: 14,
          },
          algorithm: theme.defaultAlgorithm,
        }}
      >
        <StockSiteListPage />
      </ConfigProvider>
    );
  </script>
</body>
</html>
