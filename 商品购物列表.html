    const PAGES = {

          { title: '仓库', dataIndex: 'warehouse', type: 'enum', options: WAREHOUSE_OPTIONS, width: 90 },

          { title: '备注', dataIndex: 'remark', ellipsis: true, width: 160 },
          { title: '创建人', dataIndex: 'creator', width: 90 },
          { title: '创建时间', dataIndex: 'createTime', sorter: true, width: 170 },
          { title: '修改人', dataIndex: 'updater', width: 90 },
          { title: '修改时间', dataIndex: 'updateTime', sorter: true, width: 170 },
        ],

        // 新增/编辑表单字段（15 项；type: input/number/select/textarea）
        formFields: [
          { key: 'productName', label: '商品名称', type: 'input', required: true },
          { key: 'skuCode', label: '商品编码', type: 'input', required: true },
          { key: 'category', label: '商品分类', type: 'select', required: true, options: CATEGORY_OPTIONS },
          { key: 'brand', label: '品牌', type: 'select', options: BRAND_OPTIONS },
          { key: 'spec', label: '规格型号', type: 'input' },
          { key: 'unit', label: '计量单位', type: 'input' },
          { key: 'price', label: '销售价', type: 'number', required: true, min: 0, prefix: '¥' },
          { key: 'costPrice', label: '成本价', type: 'number', min: 0, prefix: '¥' },
          { key: 'memberPrice', label: '会员价', type: 'number', min: 0, prefix: '¥' },
          { key: 'stock', label: '库存数量', type: 'number', required: true, min: 0 },
          { key: 'warehouse', label: '仓库', type: 'select', options: WAREHOUSE_OPTIONS },
          { key: 'supplier', label: '供应商', type: 'input' },
          { key: 'status', label: '状态', type: 'select', required: true, options: STATUS_OPTIONS },
          { key: 'recommend', label: '是否推荐', type: 'select', options: RECOMMEND_OPTIONS },
          { key: 'remark', label: '备注', type: 'textarea' },
        ],

        data: [
          { id: 1, skuCode: 'CD224', productName: '65W 氮化镓快充充电器', category: 'charger', brand: 'own', spec: '65W/三口', unit: '个', price: 199, costPrice: 89, memberPrice: 179, stock: 1200, sales: 8600, warehouse: 'sz', supplier: '特斯拉科技', status: 'enabled', recommend: 'yes', remark: '热销爆款', creator: '张三', createTime: '2026-05-12 09:12:33', updater: '李四', updateTime: '2026-06-05 14:20:01' },
          { id: 2, skuCode: 'US300', productName: '100W Type-C 数据线', category: 'cable', brand: 'own', spec: '1.5m/100W', unit: '条', price: 69, costPrice: 22, memberPrice: 59, stock: 5400, sales: 23000, warehouse: 'dg', supplier: '立讯精密', status: 'enabled', recommend: 'yes', remark: '支持快充协议', creator: '张三', createTime: '2026-05-15 09:15:48', updater: '王五', updateTime: '2026-06-06 10:05:12' },
          { id: 3, skuCode: 'PB205', productName: '20000mAh 移动电源', category: 'powerbank', brand: 'own', spec: '20000mAh/22.5W', unit: '个', price: 259, costPrice: 120, memberPrice: 239, stock: 800, sales: 4300, warehouse: 'sz', supplier: '欣旺达', status: 'enabled', recommend: 'no', remark: '可登机', creator: '赵六', createTime: '2026-04-28 16:42:09', updater: '赵六', updateTime: '2026-06-02 08:30:55' },
          { id: 4, skuCode: 'CM512', productName: '11 合 1 多功能扩展坞', category: 'hub', brand: 'own', spec: 'HDMI+网口+读卡', unit: '个', price: 399, costPrice: 180, memberPrice: 369, stock: 360, sales: 1500, warehouse: 'hk', supplier: '特斯拉科技', status: 'disabled', recommend: 'no', remark: '已下架待补货', creator: '孙七', createTime: '2026-04-30 11:08:20', updater: '李四', updateTime: '2026-06-04 17:45:33' },
          { id: 5, skuCode: 'PPS600', productName: '便携储能电源 600W', category: 'energy', brand: 'own', spec: '600W/512Wh', unit: '台', price: 1999, costPrice: 1100, memberPrice: 1899, stock: 120, sales: 320, warehouse: 'us', supplier: '比亚迪', status: 'enabled', recommend: 'yes', remark: '户外露营推荐', creator: '周八', createTime: '2026-03-25 10:00:00', updater: '周八', updateTime: '2026-06-01 09:00:00' },
          { id: 6, skuCode: 'US536', productName: '240W 双头数据线', category: 'cable', brand: 'own', spec: '2m/240W', unit: '条', price: 99, costPrice: 35, memberPrice: 89, stock: 3200, sales: 9800, warehouse: 'dg', supplier: '立讯精密', status: 'enabled', recommend: 'no', remark: '编织线材', creator: '吴九', createTime: '2026-05-20 15:30:18', updater: '王五', updateTime: '2026-05-29 13:12:40' },
          { id: 7, skuCode: 'A2736', productName: '140W 车载充电器', category: 'charger', brand: 'anker', spec: '140W/双口', unit: '个', price: 169, costPrice: 70, memberPrice: 159, stock: 60, sales: 210, warehouse: 'sz', supplier: '安克创新', status: 'disabled', recommend: 'no', remark: '库存不足', creator: '郑十', createTime: '2026-05-02 08:20:11', updater: '李四', updateTime: '2026-05-30 16:10:09' },
          { id: 8, skuCode: 'WXMag', productName: '磁吸无线充电器', category: 'charger', brand: 'baseus', spec: '15W/磁吸', unit: '个', price: 129, costPrice: 48, memberPrice: 119, stock: 980, sales: 5600, warehouse: 'dg', supplier: '倍思科技', status: 'enabled', recommend: 'yes', remark: '兼容 MagSafe', creator: '张三', createTime: '2026-05-08 13:45:00', updater: '王五', updateTime: '2026-06-03 11:22:30' },
        ],
      },
    };

    const DEFAULT_PAGE_KEY = 'goods-list';
    /* ============================================================
       业务填空区 END
       ============================================================ */

    /* ============ 结构区 ============ */
    const colorPrimary = '#1677FF';
    const SIDER_WIDTH = 208;
    const FILTER_PADDING = 20;
    const FILTER_CONTROL_WIDTH = 260;
    const FILTER_GUTTER = 50;
    const FILTER_ROW_GAP = 20;
    const FILTER_LABEL_WIDTH = 80;
    const FILTER_ITEM_WIDTH = FILTER_LABEL_WIDTH + FILTER_CONTROL_WIDTH;
    const FILTER_ACTION_WITH_EXPAND = 240;
    const FILTER_ACTION_NO_EXPAND = 168;

    const findLabel = (options, val) => options?.find((o) => o.value === val)?.label ?? val;
    const formatMoney = (v) => (v == null || v === '' ? '-' : `¥${Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);

    function calcFilterLayout(containerWidth, fieldCount) {
      if (!containerWidth) {
        return { collapsedCount: fieldCount, showExpand: false, perRow: fieldCount };
      }
      const inner = containerWidth - FILTER_PADDING * 2;
      const fieldsWidth = (n) => n * FILTER_ITEM_WIDTH + Math.max(0, n - 1) * FILTER_GUTTER;
      let perRow = 1;
      for (let n = fieldCount; n >= 1; n--) {
        if (fieldsWidth(n) <= inner) { perRow = n; break; }
      }
      if (fieldsWidth(fieldCount) + FILTER_ACTION_NO_EXPAND <= inner) {
        return { collapsedCount: fieldCount, showExpand: false, perRow };
      }
      let collapsedCount = 1;
      for (let k = fieldCount - 1; k >= 1; k--) {
        if (fieldsWidth(k) + FILTER_ACTION_WITH_EXPAND <= inner) { collapsedCount = k; break; }
      }
      return { collapsedCount, showExpand: true, perRow };
    }

    function LucideIcon({ name, size = 14, style = {} }) {
      const icon = lucide?.icons?.[name];
      if (!icon) return null;
      const svg = icon.toSvg({ width: size, height: size, 'stroke-width': 2 });
      return (
        <span
          style={{ display: 'inline-flex', alignItems: 'center', verticalAlign: 'middle', ...style }}
          dangerouslySetInnerHTML={{ __html: svg }}
        />
      );
    }

    function StatusBadge({ status }) {
      return status === 'enabled'
        ? <Badge status="success" text="上架" />
        : <Badge status="default" text="下架" />;
    }

    function RecommendTag({ value }) {
      return value === 'yes'
        ? <Tag color="gold">推荐</Tag>
        : <Tag>普通</Tag>;
    }

    function buildMenuItems(pages) {
      const groups = new Map();
      Object.entries(pages).forEach(([key, page]) => {
        const g = page.group || '默认';
        if (!groups.has(g)) groups.set(g, []);
        groups.get(g).push({ key, label: page.label });
      });
      return [...groups.entries()].map(([group, children]) => ({
        type: 'group', label: group, children,
      }));
    }

    function ListPage({ config }) {
      const [form] = Form.useForm();
      const [modalForm] = Form.useForm();
      const [dataSource, setDataSource] = useState(config.data);
      const [expand, setExpand] = useState(false);
      const [filters, setFilters] = useState({});
      const [selectedRowKeys, setSelectedRowKeys] = useState([]);
      const [tableSize, setTableSize] = useState('middle');
      const [modalOpen, setModalOpen] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [modalSubmitting, setModalSubmitting] = useState(false);
      const [refreshKey, setRefreshKey] = useState(0);
      const filterContainerRef = useRef(null);

      const fieldKeys = config.filterFields.map((f) => f.key);
      const [filterLayout, setFilterLayout] = useState({
        collapsedCount: fieldKeys.length, showExpand: false, perRow: fieldKeys.length,
      });

      useEffect(() => {
        setDataSource(config.data);
        setFilters({});
        setSelectedRowKeys([]);
        form.resetFields();
      }, [config]);

      useEffect(() => {
        const el = filterContainerRef.current;
        if (!el) return undefined;
        const update = () => setFilterLayout(calcFilterLayout(el.offsetWidth, fieldKeys.length));
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
      }, [config]);

      useEffect(() => {
        if (!filterLayout.showExpand) setExpand(false);
      }, [filterLayout.showExpand]);

      const filteredData = useMemo(() => {
        return dataSource.filter((row) => {
          for (const f of config.filterFields) {
            const v = filters[f.key];
            if (v === undefined || v === null || v === '' || (Array.isArray(v) && !v.length)) continue;
            if (f.type === 'input') {
              if (!String(row[f.key] ?? '').includes(String(v).trim())) return false;
            } else if (f.type === 'select') {
              if (row[f.key] !== v) return false;
            } else if (f.type === 'multiSelect') {
              if (!v.includes(row[f.key])) return false;
            } else if (f.type === 'dateRange' && v.length === 2) {
              const field = f.dateField || 'createTime';
              const t = dayjs(row[field]);
              if (t.isBefore(v[0].startOf('day')) || t.isAfter(v[1].endOf('day'))) return false;
            }
          }
          return true;
        });
      }, [dataSource, filters, refreshKey, config]);

      const onSearch = () => {
        setFilters(form.getFieldsValue());
        setSelectedRowKeys([]);
        message.success('查询完成');
      };
      const onReset = () => {
        form.resetFields();
        setFilters({});
        setSelectedRowKeys([]);
        message.info('已重置');
      };

      const openCreate = () => { setEditingId(null); modalForm.resetFields(); setModalOpen(true); };
      const openEdit = (record) => {
        setEditingId(record.id);
        const vals = {};
        config.formFields.forEach((f) => { vals[f.key] = record[f.key]; });
        modalForm.setFieldsValue(vals);
        setModalOpen(true);
      };

      const handleModalOk = async () => {
        try {
          const values = await modalForm.validateFields();
          setModalSubmitting(true);
          const now = dayjs().format('YYYY-MM-DD HH:mm:ss');
          if (editingId) {
            setDataSource((prev) => prev.map((r) =>
              r.id === editingId ? { ...r, ...values, updater: '当前用户', updateTime: now } : r
            ));
            message.success('编辑成功');
          } else {
            const newId = Math.max(0, ...dataSource.map((r) => r.id)) + 1;
            setDataSource((prev) => [
              { id: newId, sales: 0, ...values, creator: '当前用户', createTime: now, updater: '当前用户', updateTime: now },
              ...prev,
            ]);
            message.success('新增成功');
          }
          setModalOpen(false);
        } catch {
          // 校验失败保持弹窗
        } finally {
          setModalSubmitting(false);
        }
      };

      const handleDelete = (record) => {
        setDataSource((prev) => prev.filter((r) => r.id !== record.id));
        setSelectedRowKeys((keys) => keys.filter((k) => k !== record.id));
        message.success('删除成功');
      };

      const handleBatchDelete = () => {
        const count = selectedRowKeys.length;
        setDataSource((prev) => prev.filter((r) => !selectedRowKeys.includes(r.id)));
        setSelectedRowKeys([]);
        message.success(`已删除 ${count} 项`);
      };

      const requireSelection = (action) => {
        if (!selectedRowKeys.length) { message.warning('请先选择数据'); return; }
        action();
      };

      const columns = useMemo(() => {
        const cols = config.columns.map((c) => {
          const col = { title: c.title, dataIndex: c.dataIndex, key: c.dataIndex, ellipsis: c.ellipsis, width: c.width };
          if (c.sorter) {
            col.sorter = (c.type === 'money' || c.type === 'number')
              ? (a, b) => (Number(a[c.dataIndex]) || 0) - (Number(b[c.dataIndex]) || 0)
              : (a, b) => String(a[c.dataIndex] ?? '').localeCompare(String(b[c.dataIndex] ?? ''));
          }
          if (c.type === 'status') col.render = (s) => <StatusBadge status={s} />;
          else if (c.type === 'tag') col.render = (v) => <RecommendTag value={v} />;
          else if (c.type === 'enum') col.render = (v) => findLabel(c.options, v);
          else if (c.type === 'money') col.render = (v) => formatMoney(v);
          else if (c.type === 'number') col.render = (v) => (v == null ? '-' : Number(v).toLocaleString());
          else if (c.type === 'link') col.render = (text, record) => (
            <Typography.Link onClick={() => message.info(`查看商品：${text}`)}>{text}</Typography.Link>
          );
          return col;
        });
        cols.push({
          title: '操作', key: 'action', fixed: 'right', width: 160,
          render: (_, record) => (
            <Space split={<span style={{ color: '#d9d9d9' }}>|</span>} size={0}>
              <Typography.Link onClick={() => openEdit(record)}>编辑</Typography.Link>
              <Typography.Link onClick={() => message.info(`查看日志 #${record.id}`)}>日志</Typography.Link>
              <Popconfirm
                title="确认删除该商品？"
                description="删除后不可恢复"
                okText="删除"
                cancelText="取消"
                okButtonProps={{ danger: true }}
                onConfirm={() => handleDelete(record)}
              >
                <Typography.Link type="danger">删除</Typography.Link>
              </Popconfirm>
            </Space>
          ),
        });
        return cols;
      }, [config]);

      const renderFilterField = (f) => {
        const itemStyle = { marginBottom: 0 };
        const controlStyle = { width: FILTER_CONTROL_WIDTH };
        if (f.type === 'input') {
          return (
            <Form.Item label={f.label} name={f.key} style={itemStyle}>
              <Input allowClear placeholder="请输入" style={controlStyle} />
            </Form.Item>
          );
        }
        if (f.type === 'select') {
          return (
            <Form.Item label={f.label} name={f.key} style={itemStyle}>
              <Select allowClear placeholder="请选择" style={controlStyle} options={f.options} />
            </Form.Item>
          );
        }
        if (f.type === 'multiSelect') {
          return (
            <Form.Item label={f.label} name={f.key} style={itemStyle}>
              <Select mode="multiple" allowClear placeholder="请选择" style={controlStyle} options={f.options} />
            </Form.Item>
          );
        }
        if (f.type === 'dateRange') {
          return (
            <Form.Item label={f.label} name={f.key} style={itemStyle}>
              <DatePicker.RangePicker style={controlStyle} placeholder={['开始日期', '结束日期']} />
            </Form.Item>
          );
        }
        return null;
      };

      const renderFilterActions = () => (
        <Space>
          <Button onClick={onReset}>重置</Button>
          <Button type="primary" onClick={onSearch}>查询</Button>
          {filterLayout.showExpand && (
            <Button type="link" onClick={() => setExpand((v) => !v)} style={{ paddingInline: 4 }}>
              {expand ? '收起' : '展开'}
              <LucideIcon name={expand ? 'chevron-up' : 'chevron-down'} size={14} style={{ marginLeft: 4 }} />
            </Button>
          )}
        </Space>
      );

      const visibleFields = useMemo(() => {
        if (expand || !filterLayout.showExpand) return config.filterFields;
        return config.filterFields.slice(0, filterLayout.collapsedCount);
      }, [expand, filterLayout, config]);

      const expandedRows = useMemo(() => {
        if (!expand) return [visibleFields];
        const rows = [];
        for (let i = 0; i < config.filterFields.length; i += filterLayout.perRow) {
          rows.push(config.filterFields.slice(i, i + filterLayout.perRow));
        }
        return rows;
      }, [expand, filterLayout.perRow, config]);

      const densityCycle = () => {
        const order = ['large', 'middle', 'small'];
        const labels = { large: '默认', middle: '中等', small: '紧凑' };
        setTableSize((s) => {
          const next = order[(order.indexOf(s) + 1) % order.length];
          message.info(`表格密度：${labels[next]}`);
          return next;
        });
      };

      const renderFormControl = (f) => {
        if (f.type === 'select') return <Select allowClear placeholder="请选择" options={f.options} />;
        if (f.type === 'textarea') return <Input.TextArea placeholder="请输入" rows={3} />;
        if (f.type === 'number') {
          return (
            <InputNumber
              style={{ width: '100%' }}
              placeholder="请输入"
              min={f.min}
              prefix={f.prefix}
            />
          );
        }
        return <Input allowClear placeholder="请输入" />;
      };

      return (
        <div style={{ minHeight: '100%', background: '#f5f5f5' }}>
          {/* 页面标题区 */}
          <div style={{ background: '#fff', padding: '16px 24px', borderBottom: '1px solid #f0f0f0' }}>
            <div style={{ color: 'rgba(0,0,0,0.45)', marginBottom: 8 }}>
              {config.breadcrumb.map((item, i) => (
                <span key={item}>
                  {i > 0 && <span style={{ margin: '0 8px', color: 'rgba(0,0,0,0.25)' }}>/</span>}
                  <span style={{ color: i === config.breadcrumb.length - 1 ? 'rgba(0,0,0,0.65)' : undefined }}>{item}</span>
                </span>
              ))}
            </div>
            <div style={{ fontSize: 20, fontWeight: 600 }}>{config.title}</div>
          </div>

          <div style={{ padding: 24 }}>
            {/* 查询表单卡片 */}
            <Card style={{ marginBottom: 16 }} bodyStyle={{ padding: FILTER_PADDING }}>
              <div ref={filterContainerRef}>
                <Form form={form} labelCol={{ flex: `0 0 ${FILTER_LABEL_WIDTH}px` }} wrapperCol={{ flex: '0 0 auto' }}>
                  {!expand ? (
                    <Row gutter={[FILTER_GUTTER, 0]} align="middle" wrap={false}>
                      {visibleFields.map((f) => (
                        <Col flex="none" key={f.key}>{renderFilterField(f)}</Col>
                      ))}
                      <Col flex="auto" style={{ textAlign: 'right' }}>{renderFilterActions()}</Col>
                    </Row>
                  ) : (
                    <>
                      {expandedRows.map((rowFields, rowIndex) => (
                        <Row
                          key={rowFields.map((f) => f.key).join('-')}
                          gutter={[FILTER_GUTTER, 0]}
                          align="middle"
                          wrap={false}
                          style={{ marginTop: rowIndex > 0 ? FILTER_ROW_GAP : 0 }}
                        >
                          {rowFields.map((f) => (
                            <Col flex="none" key={f.key}>{renderFilterField(f)}</Col>
                          ))}
                        </Row>
                      ))}
                      <Row justify="end" style={{ marginTop: FILTER_ROW_GAP }}>
                        <Col flex="none">{renderFilterActions()}</Col>
                      </Row>
                    </>
                  )}
                </Form>
              </div>
            </Card>

            {/* 表格卡片 */}
            <Card
              title={config.title}
              extra={
                <Space>
                  <Button type="primary" icon={<PlusOutlined />} onClick={openCreate}>新增</Button>
                  <Button onClick={() => requireSelection(() => message.info(`批量编辑 ${selectedRowKeys.length} 项`))}>批量编辑</Button>
                  <Button onClick={() => requireSelection(() => {
                    setDataSource((prev) => prev.map((r) =>
                      selectedRowKeys.includes(r.id)
                        ? { ...r, status: r.status === 'enabled' ? 'disabled' : 'enabled', updater: '当前用户', updateTime: dayjs().format('YYYY-MM-DD HH:mm:ss') }
                        : r
                    ));
                    message.success(`已切换 ${selectedRowKeys.length} 项上/下架`);
                  })}>批量上/下架</Button>
                  <Popconfirm
                    title={`确认删除选中的 ${selectedRowKeys.length} 项？`}
                    description="删除后不可恢复"
                    okText="删除"
                    cancelText="取消"
                    okButtonProps={{ danger: true }}
                    disabled={!selectedRowKeys.length}
                    onConfirm={handleBatchDelete}
                  >
                    <Button danger onClick={() => { if (!selectedRowKeys.length) message.warning('请先选择数据'); }}>批量删除</Button>
                  </Popconfirm>
                  <Button onClick={() => message.success(selectedRowKeys.length ? `导出选中 ${selectedRowKeys.length} 项` : `导出全部 ${filteredData.length} 条`)}>导出</Button>
                  <Space size={4} style={{ marginLeft: 8, paddingLeft: 12, borderLeft: '1px solid #f0f0f0' }}>
                    <Button type="text" icon={<ReloadOutlined />} onClick={() => { setRefreshKey((k) => k + 1); message.success('已刷新'); }} />
                    <Button type="text" icon={<ColumnHeightOutlined />} onClick={densityCycle} />
                    <Button type="text" icon={<SettingOutlined />} onClick={() => message.info('列设置')} />
                  </Space>
                </Space>
              }
            >
              <Table
                rowKey="id"
                size={tableSize}
                columns={columns}
                dataSource={filteredData}
                rowSelection={{ selectedRowKeys, onChange: setSelectedRowKeys }}
                pagination={{ showSizeChanger: true, showTotal: (t) => `共 ${t} 条`, defaultPageSize: 10, pageSizeOptions: [10, 20, 50] }}
                scroll={{ x: 'max-content' }}
              />
            </Card>
          </div>

          {/* 新增/编辑弹窗 */}
          <Modal
            title={editingId ? `编辑${config.title}` : `新建${config.title}`}
            open={modalOpen}
            width={640}
            destroyOnClose
            maskClosable={false}
            okText="确定"
            cancelText="取消"
            confirmLoading={modalSubmitting}
            onOk={handleModalOk}
            onCancel={() => setModalOpen(false)}
            bodyStyle={{ maxHeight: '62vh', overflowY: 'auto', paddingRight: 12 }}
          >
            <Form form={modalForm} layout="horizontal" labelCol={{ span: 6 }} wrapperCol={{ span: 16 }}>
              {config.formFields.map((f) => (
                <Form.Item
                  key={f.key}
                  label={f.label}
                  name={f.key}
                  rules={f.required ? [{ required: true, message: `${f.type === 'select' ? '请选择' : '请输入'}${f.label}` }] : undefined}
                >
                  {renderFormControl(f)}
                </Form.Item>
              ))}
            </Form>
          </Modal>
        </div>
      );
    }

    function AdminShell() {
      const [collapsed, setCollapsed] = useState(false);
      const [activeKey, setActiveKey] = useState(DEFAULT_PAGE_KEY);
      const menuItems = useMemo(() => buildMenuItems(PAGES), []);
      const activePage = PAGES[activeKey];

      return (
        <Layout style={{ minHeight: '100vh' }}>
          <Sider
            theme="light"
            width={SIDER_WIDTH}
            collapsedWidth={48}
            collapsible
            collapsed={collapsed}
            onCollapse={setCollapsed}
            style={{ borderRight: '1px solid #f0f0f0' }}
          >
            <div className="admin-logo">{collapsed ? 'De' : BRAND_NAME}</div>
            <Menu
              theme="light"
              mode="inline"
              selectedKeys={[activeKey]}
              items={menuItems}
              onClick={({ key }) => setActiveKey(key)}
              style={{ borderInlineEnd: 0 }}
            />
          </Sider>
          <Layout>
            <Header style={{ height: 48, lineHeight: '48px', padding: '0 24px', background: '#fff', borderBottom: '1px solid #f0f0f0' }}>
              <div className="admin-header-title">
                {activePage.breadcrumb.map((item, i) => (
                  <span key={item}>
                    {i > 0 && <span className="sep">/</span>}
                    <span className={i === activePage.breadcrumb.length - 1 ? 'current' : ''}>{item}</span>
                  </span>
                ))}
              </div>
            </Header>
            <Content style={{ margin: 0, padding: 0, height: 'calc(100vh - 48px)', overflow: 'auto' }}>
              <ListPage key={activeKey} config={activePage} />
            </Content>
          </Layout>
        </Layout>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ConfigProvider
        locale={zhCN}
        theme={{ token: { colorPrimary, borderRadius: 6, fontSize: 14 }, algorithm: theme.defaultAlgorithm }}
      >
        <AdminShell />
      </ConfigProvider>
    );
  </script>
</body>
</html>
